<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=800, height=200, initial-scale=1.0">
    <style>
        :root {
            --theme-color: #6366f1; 
        }
        
        @font-face { 
            font-family: 'Inter'; 
            src: url('https://raw.githubusercontent.com/der46er/craftify/main/assets/fonts/inter-v20-latin_latin-ext-900.woff2') format('woff2'); 
            font-weight: 900; 
            font-display: swap; 
        }

        body {
            margin: 0;
            overflow: hidden;
            background: transparent; 
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            height: 200px;
            padding-left: 20px;
        }

        .bubble {
            display: flex;
            align-items: center;
            background: rgba(12, 12, 14, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 2px solid var(--theme-color);
            border-radius: 100px;
            padding: 15px 40px 15px 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 20px rgba(var(--theme-color), 0.2);
            position: relative;
            animation: slideIn 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            transform: translateX(-150%);
        }

        .logo {
            width: 60px;
            height: 60px;
            margin-right: 20px;
            filter: drop-shadow(0 0 10px var(--theme-color));
        }

        .text-container {
            display: flex;
            flex-direction: column;
        }

        .subtitle {
            color: var(--theme-color);
            font-size: 14px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 2px;
        }

        .title {
            color: white;
            font-size: 26px;
            font-weight: 900;
            font-style: italic;
            margin: 0;
            letter-spacing: -0.5px;
        }

        @keyframes slideIn {
            to { transform: translateX(0); }
        }
    </style>
</head>
<body>
    <div class="bubble">
        <img src="https://raw.githubusercontent.com/der46er/craftify/main/assets/favicon.png" class="logo" alt="Craftify Logo">
        <div class="text-container">
            <span class="subtitle">Join the Community</span>
            <h1 class="title">Play on play.craftify-mc.eu</h1>
        </div>
    </div>
</body>
</html>
