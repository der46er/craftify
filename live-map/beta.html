    <style>
        @font-face {
            font-family: 'Inter';
            src: url('https://raw.githubusercontent.com/der46er/craftify/main/assets/fonts/inter-v20-latin_latin-ext-regular.woff2') format('woff2');
            font-weight: 400;
            font-display: swap;
        }
        @font-face {
            font-family: 'Inter';
            src: url('https://raw.githubusercontent.com/der46er/craftify/main/assets/fonts/inter-v20-latin_latin-ext-700.woff2') format('woff2');
            font-weight: 700;
            font-display: swap;
        }
        @font-face {
            font-family: 'Inter';

            font-display: swap;
        }

        :root {
            --mc-green: #4ade80;
            --acrylic: rgba(20, 20, 25, 0.8);
            --border-glow: rgba(74, 222, 128, 0.3);
        }

        body {
            font-family: 'Inter', sans-serif;
            color: #e4e4e7;
            margin: 0;
            background-color: #0c0c0e;
            background-image: 
                linear-gradient(rgba(12, 12, 14, 0.6), rgba(12, 12, 14, 0.8)),
                url('https://raw.githubusercontent.com/der46er/craftify/main/assets/background.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .game-card {
            background: var(--acrylic);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .game-card:hover {
            border-color: var(--mc-green);
            box-shadow: 0 0 40px var(--border-glow);
        }

        #side-menu {
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateX(100%);
            background-color: #0c0c0e; 
            border-left: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: -10px 0 50px rgba(0,0,0,0.9);
            overflow-y: auto;
        }
        #side-menu.open {
            transform: translateX(0);
        }

        .lang-btn.active {
            color: var(--mc-green);
            background: rgba(74, 222, 128, 0.1);
        }
    </style>

                <svg class="w-5 h-5 md:w-4 md:h-4 fill-current" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">

            <a href="https://craftify-mc.eu/support" title="Support Us" class="flex items-center gap-2 p-2 md:px-4 md:py-2.5 bg-yellow-400/10 text-yellow-400 border border-yellow-400/30 hover:bg-yellow-400/20 hover:border-yellow-400 hover:shadow-[0_0_15px_rgba(250,204,21,0.3)] rounded-xl transition-all font-black uppercase text-xs tracking-widest">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" data-lucide="heart" aria-hidden="true" class="lucide lucide-heart w-5 h-5 md:w-4 md:h-4"><path d="M2 9.5a5.5 5.5 0 0 1 9.591-3.676.56.56 0 0 0 .818 0A5.49 5.49 0 0 1 22 9.5c0 2.29-1.5 4-3 5.5l-5.492 5.313a2 2 0 0 1-3 .019L5 15c-1.5-1.5-3-3.2-3-5.5"></path></svg>
                <span class="hidden md:inline" data-i18n="navSupport">Support Us</span>

            <button id="menu-btn" class="p-2 md:p-2.5 hover:bg-white/5 rounded-xl transition-all border border-white/10 bg-zinc-900/50 ml-1">

            </button>
        </div>

    <div id="side-menu" class="fixed top-0 right-0 h-full w-full sm:w-[400px] z-[100] p-8 md:p-12 flex flex-col">
        <div class="flex justify-between items-center mb-12 md:mb-16">
            <span data-i18n="menuTitle" class="text-xs font-black uppercase tracking-[0.4em] text-zinc-500">Main Menu</span>
            <button id="close-btn" class="p-2 hover:bg-white/5 rounded-full"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" data-lucide="x-circle" aria-hidden="true" class="lucide lucide-x-circle w-8 h-8"><circle cx="12" cy="12" r="10"></circle><path d="m15 9-6 6"></path><path d="m9 9 6 6"></path></svg></button>
        </div>
        
        <nav class="flex flex-col gap-4 md:gap-6 text-3xl md:text-4xl font-black italic uppercase tracking-tighter">

            <a href="https://craftify-mc.eu/status" class="hover:translate-x-2 transition-transform" data-i18n="navStatus">Status</a>
            <a href="https://craftify-mc.eu/videos" class="hover:translate-x-2 transition-transform" data-i18n="navVideos">Videos</a>
            <a href="https://craftify-mc.eu/chat" class="hover:translate-x-2 transition-transform" data-i18n="navChat">Quick Chat</a>
            <a href="https://craftify-mc.eu/support" class="hover:translate-x-2 transition-transform" data-i18n="navSupport">Support Us</a>
        </nav>

        <div class="mt-auto pt-10 border-t border-white/10 flex flex-col gap-6">
            <div class="flex flex-col gap-4 text-xs font-bold uppercase tracking-widest text-zinc-500">
                <a href="https://craftify-mc.eu/imprint" class="hover:text-white transition-colors" data-i18n="navLegal">Legal &amp; Privacy</a>
            </div>
            
            <div class="flex items-center justify-between mt-4 pb-4">
                <div class="flex gap-2">
                    <button id="btn-de" class="lang-btn px-4 py-2 rounded-lg font-black text-xs text-zinc-600 transition-colors">DE</button>
                    <button id="btn-en" class="lang-btn active px-4 py-2 rounded-lg font-black text-xs transition-colors">EN</button>
                </div>
            </div>
        </div>

    <!-- MAIN MAP CONTENT -->
    <main class="pt-32 md:pt-40 pb-10 px-4 md:px-6 max-w-7xl mx-auto w-full flex-grow flex flex-col h-screen">
        <section class="mb-6 md:mb-8 flex-shrink-0">
            <h1 data-i18n="mapTitle" class="text-4xl sm:text-6xl md:text-8xl lg:text-9xl font-black italic tracking-tighter leading-[1.1] md:leading-[0.85] mb-2">Live <span class="text-green-400">Map.</span></h1>
            <p data-i18n="mapDesc" class="text-zinc-400 text-sm md:text-base max-w-2xl">Explore our world in real-time. Discover player claims, towns, and live locations directly from your browser.</p>
        </section>

        <!-- Dynamic Map Container -->
        <div class="game-card rounded-[1.5rem] md:rounded-[2rem] w-full flex-grow relative overflow-hidden border border-white/10 p-0 z-10 mb-10">
            <!-- REPLACE HTTP://YOUR_SERVER_IP:8080 WITH YOUR ACTUAL MAP URL BELOW -->
            <iframe src="http://YOUR_SERVER_IP:8080" class="w-full h-full absolute inset-0 border-0 rounded-[1.5rem] md:rounded-[2rem]" title="Craftify Live Map" allowfullscreen loading="lazy"></iframe>
        </div>
    </main>

    <script>
        lucide.createIcons();
        const menuBtn = document.getElementById('menu-btn');
        const closeBtn = document.getElementById('close-btn');
        const sideMenu = document.getElementById('side-menu');
        menuBtn.addEventListener('click', () => sideMenu.classList.add('open'));
        closeBtn.addEventListener('click', () => sideMenu.classList.remove('open'));
        document.addEventListener('click', (e) => {
            if (!sideMenu.contains(e.target) && !menuBtn.contains(e.target)) {
                sideMenu.classList.remove('open');
            }
        });

        // Appended translation keys for the map page
        const translations = {
            en: {
                menuTitle: "Main Menu", navHome: "Home", navNews: "News", navIp: "IP-Address", navMods: "Modpack", navMap: "Map", navStatus: "Status", navVideos: "Videos", navChat: "Quick Chat", navSupport: "Support Us", navLegal: "Legal & Privacy",
                mapTitle: "Live <span class='text-green-400'>Map.</span>",
                mapDesc: "Explore our world in real-time. Discover player claims, towns, and live locations directly from your browser."
            },
            de: {
                menuTitle: "Hauptmenü", navHome: "Home", navNews: "News", navIp: "IP-Adresse", navMods: "Modpack", navMap: "Karte", navStatus: "Status", navVideos: "Videos", navChat: "Quick Chat", navSupport: "Unterstütze uns", navLegal: "Impressum & Datenschutz",
                mapTitle: "Live <span class='text-green-400'>Karte.</span>",
                mapDesc: "Erkunde unsere Welt in Echtzeit. Entdecke Grundstücke, Städte und Live-Standorte direkt im Browser."
            }
        };

        const btnDe = document.getElementById('btn-de');
        const btnEn = document.getElementById('btn-en');
        function setLanguage(lang) {
            document.documentElement.lang = lang;
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[lang][key]) el.innerHTML = translations[lang][key];
            });
            lucide.createIcons();
            if (lang === 'en') {
                btnEn.classList.add('active'); btnEn.classList.remove('text-zinc-600');
                btnDe.classList.remove('active'); btnDe.classList.add('text-zinc-600');
            } else {
                btnDe.classList.add('active'); btnDe.classList.remove('text-zinc-600');
                btnEn.classList.remove('active'); btnEn.classList.add('text-zinc-600');
            }
        }
        btnDe.addEventListener('click', () => setLanguage('de'));
        btnEn.addEventListener('click', () => setLanguage('en'));

        setLanguage('en');
    </script>
</body>
</html>
