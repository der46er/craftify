<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Craftify Mc | Videos</title>
    
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/der46er/craftify/main/assets/favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @font-face { font-family: 'Inter'; src: url('https://raw.githubusercontent.com/der46er/craftify/main/assets/fonts/inter-v20-latin_latin-ext-regular.woff2') format('woff2'); font-weight: 400; font-style: normal; font-display: swap; }
        @font-face { font-family: 'Inter'; src: url('https://raw.githubusercontent.com/der46er/craftify/main/assets/fonts/inter-v20-latin_latin-ext-700.woff2') format('woff2'); font-weight: 700; font-style: normal; font-display: swap; }
        @font-face { font-family: 'Inter'; src: url('https://raw.githubusercontent.com/der46er/craftify/main/assets/fonts/inter-v20-latin_latin-ext-900.woff2') format('woff2'); font-weight: 900; font-style: normal; font-display: swap; }

        :root { --mc-green: #4ade80; --acrylic: rgba(20, 20, 25, 0.75); }
        
        body { font-family: 'Inter', sans-serif; color: #e4e4e7; margin: 0; background-color: #0c0c0e; background-image: linear-gradient(rgba(12, 12, 14, 0.8), rgba(12, 12, 14, 0.95)), url('https://raw.githubusercontent.com/der46er/craftify/main/assets/background.png'); background-size: cover; background-position: center; background-attachment: fixed; min-height: 100vh; display: flex; flex-direction: column; }
        
        .game-card { background: var(--acrylic); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 10px 50px rgba(0,0,0,0.8); }
        
        /* Sidebar */
        #side-menu { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); transform: translateX(100%); background-color: #0c0c0e; border-left: 1px solid rgba(255, 255, 255, 0.05); }
        #side-menu.open { transform: translateX(0); }
    </style>
</head>
<body>

    <header class="w-full z-50 p-4 md:p-6 flex justify-between items-center bg-zinc-950/50 backdrop-blur-xl border-b border-white/5 fixed top-0">
        <div class="flex items-center gap-3">
            <img src="https://raw.githubusercontent.com/der46er/craftify/main/assets/favicon.png" alt="Logo" class="w-8 h-8 md:w-10 md:h-10">
            <span class="font-black italic text-xl md:text-2xl tracking-tighter">Craftify <span class="text-green-400">Mc</span></span>
        </div>
        <button id="menu-btn" class="p-2 md:p-3 hover:bg-white/5 rounded-2xl transition-all border border-white/10 bg-zinc-900/50">
            <i data-lucide="menu-square" class="w-6 h-6 md:w-7 md:h-7"></i>
        </button>
    </header>

    <div id="side-menu" class="fixed top-0 right-0 h-full w-full sm:w-[400px] z-[100] p-10 flex flex-col shadow-2xl">
        <div class="flex justify-between items-center mb-12">
            <span data-i18n="menuTitle" class="text-[10px] font-black uppercase tracking-[0.3em] text-zinc-400">Main Menu</span>
            <button id="close-btn" class="hover:scale-110 transition-transform">
                <i data-lucide="x-circle" class="w-8 h-8 text-white"></i>
            </button>
        </div>
        
        <nav class="flex flex-col gap-6 text-[2.5rem] font-black italic uppercase tracking-tighter leading-none">
            <a href="https://craftify-mc.eu/" class="hover:text-zinc-300 transition-colors" data-i18n="navHome">Home</a>
            <a href="https://craftify-mc.eu/news" class="hover:text-zinc-300 transition-colors" data-i18n="navNews">News</a>
            <a href="https://craftify-mc.eu/ip" class="hover:text-zinc-300 transition-colors" data-i18n="navIp">IP-Address</a>
            <a href="https://craftify-mc.eu/modpack" class="hover:text-zinc-300 transition-colors" data-i18n="navMods">Modpack</a>
            <a href="https://craftify-mc.eu/status" class="hover:text-zinc-300 transition-colors" data-i18n="navStatus">Status</a>
            <a href="https://craftify-mc.eu/videos" class="text-green-400" data-i18n="navVideos">Videos</a>
            <a href="https://craftify-mc.eu/chat" class="hover:text-zinc-300 transition-colors" data-i18n="navChat">Quick Chat</a>
        </nav>

        <div class="mt-auto pt-10 border-t border-white/10 flex flex-col gap-4">
            <a href="https://craftify-mc.eu/imprint/" class="text-xs font-bold tracking-[0.2em] text-zinc-400 hover:text-white uppercase transition-colors" data-i18n="navLegal">Legal & Privacy</a>
            <a href="https://socials.thataustrianone.eu" target="_blank" class="text-xs font-bold tracking-[0.2em] text-zinc-400 hover:text-white uppercase transition-colors flex items-center gap-2" data-i18n="navSocials">
                <i data-lucide="share-2" class="w-4 h-4"></i> Socials
            </a>

            <div class="flex gap-4 mt-4">
                <button id="btn-de" class="lang-btn font-black text-sm text-white hover:text-green-400 px-3 py-1.5 transition-colors">DE</button>
                <button id="btn-en" class="lang-btn active font-black text-sm bg-green-900/40 text-green-400 px-3 py-1.5 rounded transition-colors">EN</button>
            </div>
        </div>
    </div>

    <main class="pt-32 pb-10 px-4 flex-grow flex items-center justify-center w-full">
        <div class="max-w-6xl w-full flex flex-col items-center">
            
            <h1 data-i18n="pageTitle" class="text-4xl sm:text-5xl md:text-6xl font-black italic tracking-tighter text-center mb-12">
                Community <span class="text-green-400">Videos.</span>
            </h1>

            <div class="game-card p-6 md:p-10 rounded-[2.5rem] w-full relative overflow-hidden min-h-[50vh]">
                <div class="absolute top-0 left-1/2 -translate-x-1/2 w-96 h-96 bg-green-400/5 blur-[100px] rounded-full pointer-events-none"></div>

                <div class="relative z-10 h-full flex flex-col">
                    
                    <div id="loading-spinner" class="flex-grow flex flex-col items-center justify-center py-20">
                        <div class="w-12 h-12 border-4 border-white/10 border-t-green-400 rounded-full animate-spin mb-4"></div>
                        <p data-i18n="loading" class="text-sm font-bold tracking-[0.2em] text-zinc-400 uppercase">Loading Videos...</p>
                    </div>

                    <div id="video-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-2 gap-8 hidden">
                        </div>

                </div>
            </div>

        </div>
    </main>

    <script>
        lucide.createIcons();
        
        // --- Menü Logik ---
        const menuBtn = document.getElementById('menu-btn');
        const closeBtn = document.getElementById('close-btn');
        const sideMenu = document.getElementById('side-menu');

        menuBtn.addEventListener('click', () => sideMenu.classList.add('open'));
        closeBtn.addEventListener('click', () => sideMenu.classList.remove('open'));

        // --- Übersetzungen ---
        const translations = {
            en: { 
                menuTitle: "Main Menu", navHome: "Home", navNews: "News", navIp: "IP-Address", navMods: "Modpack", navStatus: "Status", navVideos: "Videos", navChat: "Quick Chat", navLegal: "Legal & Privacy", navSocials: "Socials",
                pageTitle: "Community <span class='text-green-400'>Videos.</span>",
                loading: "Loading Videos...",
                noVideos: "Nothing here yet."
            },
            de: { 
                menuTitle: "Hauptmenü", navHome: "Home", navNews: "News", navIp: "IP-Adresse", navMods: "Modpack", navStatus: "Status", navVideos: "Videos", navChat: "Quick Chat", navLegal: "Legal & Privacy", navSocials: "Socials",
                pageTitle: "Community <span class='text-green-400'>Videos.</span>",
                loading: "Lade Videos...",
                noVideos: "Noch nichts hier."
            }
        };

        const btnDe = document.getElementById('btn-de');
        const btnEn = document.getElementById('btn-en');
        let currentLang = 'en';
        
        function setLanguage(lang) {
            currentLang = lang;
            document.documentElement.lang = lang;
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[lang][key]) el.innerHTML = translations[lang][key];
            });

            if (lang === 'en') {
                btnEn.className = 'lang-btn active font-black text-sm bg-green-900/40 text-green-400 px-3 py-1.5 rounded transition-colors';
                btnDe.className = 'lang-btn font-black text-sm text-white hover:text-green-400 px-3 py-1.5 transition-colors';
            } else {
                btnDe.className = 'lang-btn font-black text-sm bg-green-900/40 text-green-400 px-3 py-1.5 rounded transition-colors';
                btnEn.className = 'lang-btn font-black text-sm text-white hover:text-green-400 px-3 py-1.5 transition-colors';
            }

            const emptyState = document.getElementById('empty-state-text');
            if (emptyState) {
                emptyState.innerText = translations[currentLang].noVideos;
            }
        }
        
        btnDe.addEventListener('click', () => setLanguage('de'));
        btnEn.addEventListener('click', () => setLanguage('en'));
        setLanguage('en');

        // --- GITHUB API & VIDEO EMBED LOGIK ---
        function showEmptyState(container, loading) {
            loading.classList.add('hidden');
            container.classList.remove('hidden');
            container.className = "flex flex-col items-center justify-center py-16 opacity-50";
            container.innerHTML = `
                <i data-lucide="video-off" class="w-16 h-16 text-zinc-500 mb-6"></i>
                <p id="empty-state-text" class="text-zinc-400 font-black uppercase tracking-widest text-xl">${translations[currentLang].noVideos}</p>
            `;
            lucide.createIcons();
        }

        async function loadVideos() {
            const container = document.getElementById('video-container');
            const loading = document.getElementById('loading-spinner');
            
            try {
                const response = await fetch('https://api.github.com/repos/der46er/craftify/contents/assets/videos');
                
                if (!response.ok) {
                    showEmptyState(container, loading);
                    return;
                }
                
                const files = await response.json();
                const videoFiles = files.filter(f => f.type === 'file');
                
                if (videoFiles.length === 0) {
                    showEmptyState(container, loading);
                    return;
                }

                for (const file of videoFiles) {
                    const rawTitle = file.name.replace(/\.[^/.]+$/, "");
                    const cleanTitle = rawTitle.replace(/_/g, " ");
                    
                    const contentRes = await fetch(file.download_url);
                    let fileContent = await contentRes.text();
                    fileContent = fileContent.trim();
                    
                    let embedUrl = "";

                    // NEU: Wenn du den <iframe> Code von YouTube direkt reinkopierst
                    if (fileContent.includes('<iframe') && fileContent.includes('src=')) {
                        const srcMatch = fileContent.match(/src="([^"]+)"/);
                        if (srcMatch && srcMatch[1]) {
                            embedUrl = srcMatch[1];
                        }
                    } 
                    // FALLBACK: Wenn du nur den normalen YouTube Link reinkopierst
                    else {
                        const ytRegex = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/i;
                        const match = fileContent.match(ytRegex);
                        if (match && match[1]) {
                            embedUrl = `https://www.youtube.com/embed/${match[1]}?rel=0`;
                        }
                    }
                    
                    if (embedUrl) {
                        const card = document.createElement('div');
                        card.className = 'bg-black/40 border border-white/10 rounded-[2rem] overflow-hidden shadow-2xl transition-transform duration-300 hover:scale-[1.02] flex flex-col group';
                        
                        card.innerHTML = `
                            <div class="aspect-video w-full bg-zinc-900/50 relative">
                                <iframe class="absolute top-0 left-0 w-full h-full" src="${embedUrl}" title="${cleanTitle}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
                            </div>
                            <div class="p-6 border-t border-white/5 flex items-center justify-between">
                                <h3 class="font-black italic uppercase tracking-tighter text-white text-xl truncate pr-4" title="${cleanTitle}">${cleanTitle}</h3>
                                <div class="w-10 h-10 rounded-xl bg-white/5 flex items-center justify-center shrink-0 group-hover:bg-green-400/20 transition-colors">
                                    <i data-lucide="play" class="w-4 h-4 text-zinc-400 group-hover:text-green-400 transition-colors"></i>
                                </div>
                            </div>
                        `;
                        container.appendChild(card);
                    }
                }
                
                if(container.innerHTML.trim() === '') {
                    showEmptyState(container, loading);
                } else {
                    loading.classList.add('hidden');
                    container.classList.remove('hidden');
                    lucide.createIcons();
                }

            } catch (error) {
                console.error("Fehler beim Laden:", error);
                showEmptyState(container, loading);
            }
        }

        loadVideos();
    </script>
</body>
</html>
